name: Safety Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - codex/**

permissions:
  contents: read

jobs:
  safety:
    name: Local safety checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: python3 -m pip install -e '.[dev]'

      - name: Validate safety invariants
        run: python3 scripts/check_safety_invariants.py

      - name: Validate Quizlet intake JSON
        run: |
          python3 -m json.tool docs/intakes/quizlet/program_profile.json >/dev/null
          python3 -m json.tool docs/intakes/quizlet/program_score.json >/dev/null
          python3 -m json.tool docs/intakes/quizlet/work_order.json >/dev/null
          python3 -m json.tool docs/intakes/quizlet/evidence_manifest_template.json >/dev/null
          python3 -m json.tool docs/intakes/quizlet/final_submission_check.json >/dev/null

      - name: Run tests
        run: python3 -m pytest -q

      - name: Run local demo
        run: python3 -m bugos.cli run-demo --workspace demo_out
